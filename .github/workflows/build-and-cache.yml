name: Build and Publish Cache

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish-cache:
        description: "Push build closures to Cachix"
        type: boolean
        default: true
      run-vm-checks:
        description: "Run VM integration checks after the package build"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PUBLISH_CACHE: ${{ github.event_name != 'workflow_dispatch' || inputs.publish-cache }}
  RUN_VM_CHECKS: ${{ github.event_name == 'workflow_dispatch' && inputs.run-vm-checks }}

jobs:
  build:
    name: build ${{ matrix.system }}
    runs-on:
      group: ${{ matrix.runner_group }}
      labels: ${{ matrix.runner_label }}
    environment: publish-nix
    timeout-minutes: 720
    env:
      NIX_BUILD_CORES: "16"
      NIX_MAX_JOBS: "1"
      CACHIX_CACHE_NAME: ${{ vars.CACHIX_CACHE_NAME }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner_group: ascii-rs
            runner_label: x86-xlarge
          - system: aarch64-linux
            runner_group: Default
            runner_label: aarch-xlarge

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Check Cachix credentials
        if: env.PUBLISH_CACHE == 'true'
        run: |
          if [[ -z "$CACHIX_CACHE_NAME" || -z "$CACHIX_AUTH_TOKEN" ]]; then
            echo "::error::CACHIX_CACHE_NAME variable and CACHIX_AUTH_TOKEN secret are required when publish-cache is enabled"
            exit 1
          fi

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-cache-name: ${{ env.PUBLISH_CACHE == 'true' && env.CACHIX_CACHE_NAME || '' }}
          cachix-auth-token: ${{ env.PUBLISH_CACHE == 'true' && env.CACHIX_AUTH_TOKEN || '' }}

      - name: Check fixed-output hashes
        run: |
          set -euo pipefail
          if grep -R "lib.fakeHash" nix/packages/starrocks-thirdparty-sources.nix nix/packages/starrocks-maven-repository.nix; then
            echo "::error::Run the Refresh fixed-output hashes workflow before building the package closure"
            exit 1
          fi

      - name: Build package closure
        run: |
          set -euo pipefail

          nix_build_flags=(
            --print-build-logs
            --cores "$NIX_BUILD_CORES"
            --max-jobs "$NIX_MAX_JOBS"
          )

          build_package() {
            local attr="$1"
            local out_link="$2"

            nix build "$attr" "${nix_build_flags[@]}" --out-link "$out_link"
          }

          build_package \
            ".#packages.${{ matrix.system }}.starrocks-thirdparty-sources" \
            "result-${{ matrix.system }}-thirdparty-sources"
          build_package \
            ".#packages.${{ matrix.system }}.starrocks-maven-repository" \
            "result-${{ matrix.system }}-maven-repository"
          build_package \
            ".#packages.${{ matrix.system }}.starrocks-thirdparty" \
            "result-${{ matrix.system }}-thirdparty"
          build_package \
            ".#packages.${{ matrix.system }}.starrocks" \
            "result-${{ matrix.system }}-starrocks"

          if [[ "$PUBLISH_CACHE" == "true" ]]; then
            store_paths=()
            for out_link in \
              "result-${{ matrix.system }}-thirdparty-sources" \
              "result-${{ matrix.system }}-maven-repository" \
              "result-${{ matrix.system }}-thirdparty" \
              "result-${{ matrix.system }}-starrocks"
            do
              store_paths+=("$(readlink -f "$out_link")")
            done

            nix path-info --recursive "${store_paths[@]}" \
              | sort -u \
              | cachix push "$CACHIX_CACHE_NAME"
          fi

      - name: Run VM integration checks
        if: env.RUN_VM_CHECKS == 'true'
        run: |
          set -euo pipefail

          nix_build_flags=(
            --print-build-logs
            --cores "$NIX_BUILD_CORES"
            --max-jobs "$NIX_MAX_JOBS"
          )

          nix build ".#checks.${{ matrix.system }}.starrocks-single-node" "${nix_build_flags[@]}"
          nix build ".#checks.${{ matrix.system }}.starrocks-multinode" "${nix_build_flags[@]}"
