name: Refresh fixed-output hashes

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh-x86:
    runs-on:
      group: ascii-rs
      labels: x86-xlarge
    timeout-minutes: 360
    outputs:
      thirdparty-sources-hash: ${{ steps.hashes.outputs.thirdparty-sources-hash }}
      maven-repository-hash: ${{ steps.hashes.outputs.maven-repository-hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Refresh x86_64-linux hashes
        run: nix/scripts/update-fixed-output-hashes.sh x86_64-linux

      - name: Export hashes
        id: hashes
        run: |
          set -euo pipefail
          nix/scripts/update-fixed-output-hashes.sh --print-system x86_64-linux >> "$GITHUB_OUTPUT"

  refresh-aarch:
    runs-on:
      group: ascii-rs
      labels: aarch-xlarge
    timeout-minutes: 360
    outputs:
      thirdparty-sources-hash: ${{ steps.hashes.outputs.thirdparty-sources-hash }}
      maven-repository-hash: ${{ steps.hashes.outputs.maven-repository-hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Refresh aarch64-linux hashes
        run: nix/scripts/update-fixed-output-hashes.sh aarch64-linux

      - name: Export hashes
        id: hashes
        run: |
          set -euo pipefail
          nix/scripts/update-fixed-output-hashes.sh --print-system aarch64-linux >> "$GITHUB_OUTPUT"

  update:
    needs: [refresh-x86, refresh-aarch]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Apply hashes
        env:
          X86_THIRDPARTY_SOURCES_HASH: ${{ needs.refresh-x86.outputs.thirdparty-sources-hash }}
          X86_MAVEN_REPOSITORY_HASH: ${{ needs.refresh-x86.outputs.maven-repository-hash }}
          AARCH_THIRDPARTY_SOURCES_HASH: ${{ needs.refresh-aarch.outputs.thirdparty-sources-hash }}
          AARCH_MAVEN_REPOSITORY_HASH: ${{ needs.refresh-aarch.outputs.maven-repository-hash }}
        run: |
          set -euo pipefail
          nix/scripts/update-fixed-output-hashes.sh --replace-only \
            x86_64-linux "$X86_THIRDPARTY_SOURCES_HASH" "$X86_MAVEN_REPOSITORY_HASH" \
            aarch64-linux "$AARCH_THIRDPARTY_SOURCES_HASH" "$AARCH_MAVEN_REPOSITORY_HASH"

      - name: Format
        run: nix fmt

      - name: Show diff
        run: git diff -- nix/packages/starrocks-thirdparty-sources.nix nix/packages/starrocks-maven-repository.nix

      - name: Push update branch and create pull request
        env:
          BRANCH: ci/refresh-starrocks-fixed-output-hashes
          TITLE: "Refresh StarRocks fixed-output hashes"
          COMMIT_MESSAGE: "Refresh StarRocks fixed-output hashes"
          BODY: |
            Updates the fixed-output hashes produced by the pinned StarRocks source vendoring steps.
          GITHUB_TOKEN: ${{ github.token }}
        run: .github/scripts/push-update-pr.sh
