name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Check formatting
        run: |
          nix fmt
          git diff --exit-code

      - name: Check flake shape
        run: nix flake check --no-build --all-systems

      - name: Check package build plans
        run: |
          nix build .#packages.x86_64-linux.starrocks --dry-run
          nix build .#packages.aarch64-linux.starrocks --dry-run
